name: unit-tests

on:
  pull_request_target:
    branches:
      - staging
      - main
    paths:
      # Tests will be run only when there are changes in the code:
      - examples/**
      - '!examples/**/*.md'
      - recommenders/**
      - '!recommenders/**/*.md'
      - tests/**
      - '!tests/**/*.md'
      - setup.py
      - .github/**
    types: 
      - opened
      - synchronize
      - reopened
      - ready_for_review

  # Enable manual trigger
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags to label this manual run (optional)'
        default: 'Manual trigger'

jobs:
  run-tests:
    uses: ./.github/workflows/compshare-vm.yml
    if: github.event.pull_request.draft == false
    with:
      timeout-minutes: 180  # Timeout for all the processes, not each VMs (not all VMs are deployed at the same time)
      type: pr_gate
    secrets:
      COMPSHARE_PRIVATE_KEY: ${{ secrets.COMPSHARE_PRIVATE_KEY }}
      COMPSHARE_PUBLIC_KEY: ${{ secrets.COMPSHARE_PUBLIC_KEY }}
      VM_DOCKER_MIRROR_URL: ${{ secrets.VM_DOCKER_MIRROR_URL }}
      VM_HTTP_PROXY: ${{ secrets.VM_HTTP_PROXY }}
      VM_HTTPS_PROXY: ${{ secrets.VM_HTTPS_PROXY }}
      VM_PIP_INDEX_URL: ${{ secrets.VM_PIP_INDEX_URL }}
      VM_PROXY_CERTIFICATE: ${{ secrets.VM_PROXY_CERTIFICATE }}
